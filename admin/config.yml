backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "data/home.json"
        fields:
          - { label: "Main Headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subheadline", widget: "text" }

  - name: "businesses"
    label: "Local Businesses"
    folder: "assets/images/businesses"
    extension: "png"
    format: "raw"
    create: true
    fields:
      - { label: "Logo / Image", name: "title", widget: "image" }
