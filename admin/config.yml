backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "business_data"
    label: "Local Businesses"
    files:
      - label: "Businesses"
        name: "businesses"
        file: "data/businesses.json"
        fields:
          - label: "Businesses"
            name: "businesses"
            widget: "list"
            summary: "{{fields.name}} — {{fields.location}}"
            fields:
              - { label: "ID (slug)", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Specific Category", name: "specificCategory", widget: "string", required: false }
              - { label: "Subcategory", name: "subcategory", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Postcode Area", name: "postcodeArea", widget: "string", required: false, default: "NP" }
              - { label: "Town", name: "town", widget: "string", required: false }
              - { label: "Short Description", name: "shortDescription", widget: "text" }
              - { label: "Full Description", name: "description", widget: "text" }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - { label: "Verified", name: "verified", widget: "boolean", default: false }

              - { label: "Hero Image (path)", name: "heroImage", widget: "string", required: false }
              - { label: "Hero Position", name: "heroPosition", widget: "string", required: false }
              - { label: "Logo (path)", name: "logo", widget: "string", required: false }
              - { label: "Card Image (path)", name: "cardImage", widget: "string", required: false }
              - { label: "Card Image Fit", name: "cardImageFit", widget: "string", required: false }
              - { label: "Logo Status", name: "logoStatus", widget: "string", required: false }
              - { label: "Logo Source URL", name: "logoSourceUrl", widget: "string", required: false }

              - label: "Gallery"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Image path", name: "image", widget: "string", required: false }
              - { label: "Gallery Layout", name: "galleryLayout", widget: "string", required: false }

              - label: "Image Alt Text"
                name: "imageAlt"
                widget: "object"
                required: false
                fields:
                  - { label: "Logo Alt", name: "logo", widget: "string", required: false }
                  - { label: "Card Image Alt", name: "cardImage", widget: "string", required: false }
                  - { label: "Hero Image Alt", name: "heroImage", widget: "string", required: false }

              - label: "Services"
                name: "services"
                widget: "list"
                required: false
                field: { label: "Service", name: "service", widget: "string", required: false }
              - { label: "Services Source", name: "servicesSource", widget: "string", required: false }

              - label: "Highlights"
                name: "highlights"
                widget: "list"
                required: false
                field: { label: "Highlight", name: "highlight", widget: "string", required: false }

              - label: "Opening Hours"
                name: "openingHours"
                widget: "list"
                required: false
                field: { label: "Line", name: "line", widget: "string", required: false }
              - label: "On-Call Hours"
                name: "onCallHours"
                widget: "list"
                required: false
                field: { label: "Line", name: "line", widget: "string", required: false }
              - { label: "Payment Note", name: "paymentNote", widget: "string", required: false }

              - label: "Areas Covered"
                name: "areasCovered"
                widget: "list"
                required: false
                field: { label: "Area", name: "area", widget: "string", required: false }
              - label: "Aliases"
                name: "aliases"
                widget: "list"
                required: false
                field: { label: "Alias", name: "alias", widget: "string", required: false }

              - label: "Contact"
                name: "contact"
                widget: "object"
                required: false
                fields:
                  - { label: "Phone", name: "phone", widget: "string", required: false }
                  - { label: "Email", name: "email", widget: "string", required: false }
                  - { label: "Website", name: "website", widget: "string", required: false }
                  - { label: "Address", name: "address", widget: "string", required: false }
                  - { label: "Google Maps URL", name: "googleMapsUrl", widget: "string", required: false }

              - label: "Social"
                name: "social"
                widget: "object"
                required: false
                fields:
                  - { label: "Facebook", name: "facebook", widget: "string", required: false }
                  - { label: "Instagram", name: "instagram", widget: "string", required: false }
                  - { label: "TikTok", name: "tiktok", widget: "string", required: false }
                  - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
                  - { label: "YouTube", name: "youtube", widget: "string", required: false }

              - { label: "Website (top-level)", name: "website", widget: "string", required: false }
              - { label: "Source Page URL", name: "sourcePageUrl", widget: "string", required: false }
              - { label: "About Source", name: "aboutSource", widget: "string", required: false }
              - { label: "About Updated", name: "aboutUpdated", widget: "string", required: false }
              - { label: "Short Description Source", name: "shortDescriptionSource", widget: "string", required: false }
              - { label: "Referral Code", name: "referralCode", widget: "string", required: false }
